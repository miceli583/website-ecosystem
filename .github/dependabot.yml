version: 2
updates:
  # Monthly grouped version bumps (npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    target-branch: "dev"
    commit-message:
      prefix: "chore(deps):"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  # Monthly GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    target-branch: "dev"
    commit-message:
      prefix: "chore(ci):"
    groups:
      actions-updates:
        patterns:
          - "*"
